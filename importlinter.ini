[importlinter]
root_package = ml
include_external_packages = True
verbosity = 1

[importlinter:actors_do_not_depend_on_concrete_stores]
name = Actors must not import concrete stores
type = forbidden
source_modules =
    ml.actors.base
    ml.actors.signal
forbidden_modules =
    ml.stores.feature_store_facade
    ml.stores.model_store
    ml.stores.strategy_store
    ml.stores.data_store_facade
ignore_imports =
    ml.actors.actor_services -> ml.core.integration

[importlinter:actors_may_depend_on_protocols]
name = Actors may depend on store protocols and common/config
type = layers
layers =
    ml.actors
    ml.stores.protocols
    ml.config
    ml.common
; Note: Using absolute layer paths; no containers scoping

[importlinter:no_direct_prometheus_in_domain]
name = Forbid direct prometheus_client imports outside ml/common/* and tests
type = forbidden
source_modules =
    ml
forbidden_modules =
    prometheus_client
ignore_imports =
    ml.common.metrics -> prometheus_client
    ml._imports -> prometheus_client
    ml.tests.unit.consumers.test_aggregator_metrics -> prometheus_client

[importlinter:stores_may_depend_on_registry_protocols]
name = Stores may depend on registry protocols and config/common
type = layers
layers =
    ml.stores
    ml.registry.protocols
    ml.config
    ml.common

[importlinter:domain_must_not_import_cli]
name = Domain code must not import CLI modules
type = forbidden
source_modules =
    ml
forbidden_modules =
    ml.cli
ignore_imports =
    ml.cli.* -> *

[importlinter:hot_path_must_not_import_cold]
name = Hot path (actors/strategies) must not import cold-path only modules
type = forbidden
source_modules =
    ml.actors
    ml.strategies
forbidden_modules =
    ml.preprocessing
    ml.cli
