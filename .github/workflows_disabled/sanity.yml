name: Sanity and Fast Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  sanity-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: |
          pip install uv
      - name: Install project (deps only)
        run: |
          uv pip install -e .
      - name: Sanity (advisory)
        run: make sanity || true
      - name: Fast tests (no DB)
        run: make pytest-ml-fast

