name: ml-microbench

permissions:
  contents: read
  actions: read

on:
  pull_request:
    branches: ['*']
  workflow_dispatch:

jobs:
  microbench:
    runs-on: ubuntu-latest
    env:
      BUILD_MODE: release
    steps:
      - uses: step-security/harden-runner@6c439dc8bdf85cadbbce9ed30d1c7b959517bc49 # v2.12.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          make install-debug

      - name: Run ML micro-benchmarks (soft gate)
        run: |
          mkdir -p perf-artifacts
          uv run --active --no-sync pytest -q ml/tests/performance/test_ml_hot_path_benchmarks.py \
            --benchmark-only --benchmark-json=perf-artifacts/bench.json || true

      - name: Upload micro-bench artifacts
        uses: actions/upload-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ml-microbench
          path: perf-artifacts/**
          if-no-files-found: warn

