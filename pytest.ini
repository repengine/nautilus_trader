[pytest]
filterwarnings =
    ignore:.*path is deprecated.*:DeprecationWarning
    ignore:.*invalid escape sequence.*:SyntaxWarning
    ignore:.*Module already imported so cannot be rewritten.*:pytest.PytestAssertRewriteWarning
    ignore:Attribute 'loss' is an instance of `nn.Module` and is already saved during checkpointing.*:UserWarning:lightning.pytorch.utilities.parsing
    ignore:Attribute 'logging_metrics' is an instance of `nn.Module` and is already saved during checkpointing.*:UserWarning:lightning.pytorch.utilities.parsing
    ignore:The 'val_dataloader' does not have many workers.*:UserWarning:lightning.pytorch.trainer.connectors.data_connector
    ignore:The 'train_dataloader' does not have many workers.*:UserWarning:lightning.pytorch.trainer.connectors.data_connector
    ignore:Your `IterableDataset` has `__len__` defined.*:UserWarning:lightning.pytorch.utilities.data
markers =
    integration: marks tests as integration tests (slow)
    serial: marks tests that must run serially
    slow: marks tests as slow
    unit: marks tests as unit tests
    facade: marks facade tests
    security: marks security tests
    parity: marks parity/compatibility tests (legacy vs new implementations)
    e2e: marks end-to-end tests
    property: marks property-based tests
    runtime_correctness: marks tests in the dedicated ML runtime-correctness CI subset
asyncio_mode = strict
log_cli = true
log_cli_level = INFO
testpaths = ml/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
