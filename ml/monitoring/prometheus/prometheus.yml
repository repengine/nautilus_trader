

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'nautilus-ml'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      scheme: http
      timeout: 10s

# Load rules once and periodically evaluate them
rule_files:
  - "/etc/prometheus/alerts/*.yml"

# Recording rules for frequently used queries
# These pre-compute expensive queries for better dashboard performance
recording_rules:
  - name: ml_aggregations
    interval: 30s
    rules:
      # Average inference latency by model
      - record: ml:inference_latency:avg5m
        expr: |
          avg by (model, instrument) (
            rate(ml_prediction_latency_seconds_sum[5m]) /
            rate(ml_prediction_latency_seconds_count[5m])
          )

      # Cache effectiveness ratio
      - record: ml:cache_effectiveness:ratio
        expr: |
          ml_cache_hit_ratio /
          (1 + rate(ml_cache_misses_total[5m]))

      # Model accuracy trend
      - record: ml:model_accuracy:trend1h
        expr: |
          avg_over_time(ml_model_accuracy_rolling[1h])

      # Resource utilization efficiency
      - record: ml:resource_efficiency:score
        expr: |
          (
            rate(ml_predictions_total[5m]) /
            (avg(ml_cpu_usage_percent) + 0.001)
          ) * 100

# Scrape configurations
scrape_configs:
  # ML Application metrics
  - job_name: 'ml-application'
    static_configs:
      - targets:
          - 'host.docker.internal:8000'  # ML metrics endpoint
        labels:
          service: 'ml-core'
    scrape_interval: 5s
    scrape_timeout: 4s
    metrics_path: '/metrics'

  # Pushgateway for batch jobs
  - job_name: 'pushgateway'
    static_configs:
      - targets:
          - 'pushgateway:9091'
        labels:
          service: 'batch-jobs'
    honor_labels: true

  # Node exporter for system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - 'node-exporter:9100'
        labels:
          service: 'system'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'
        labels:
          service: 'prometheus'

  # Grafana metrics
  - job_name: 'grafana'
    static_configs:
      - targets:
          - 'grafana:3000'
        labels:
          service: 'grafana'

  # Alert manager metrics
  - job_name: 'alertmanager'
    static_configs:
      - targets:
          - 'alertmanager:9093'
        labels:
          service: 'alertmanager'

  # Optional: GPU metrics (uncomment if using NVIDIA GPUs)
  # - job_name: 'dcgm-exporter'
  #   static_configs:
  #     - targets:
  #         - 'dcgm-exporter:9400'
  #       labels:
  #         service: 'gpu'

# Global metric relabeling rules
metric_relabel_configs:
  # Drop high-cardinality metrics that we don't need
  - source_labels: [__name__]
    regex: 'go_memstats_.*'
    action: drop

  # Drop debug metrics in production
  - source_labels: [__name__]
    regex: '.*_debug_.*'
    action: drop