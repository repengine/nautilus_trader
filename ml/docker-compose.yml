version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: nautilus-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nautilus
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      # Mount migrations as init scripts (executed alphabetically)
      - ./stores/migrations/001_stores_schema.sql:/docker-entrypoint-initdb.d/10_stores_schema.sql:ro
      - ./stores/migrations/002_auto_partitioning.sql:/docker-entrypoint-initdb.d/20_auto_partitioning.sql:ro
      - ./stores/migrations/003_market_data.sql:/docker-entrypoint-initdb.d/30_market_data.sql:ro
      - ./registry/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/40_registry_schema.sql:ro
      # Persist data
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nautilus"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - nautilus-ml

  # Optional: PgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nautilus-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nautilus.io
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped
    networks:
      - nautilus-ml

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: nautilus-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped
    networks:
      - nautilus-ml

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: nautilus-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - nautilus-ml

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  nautilus-ml:
    driver: bridge
    name: nautilus-ml