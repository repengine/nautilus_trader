# Minimal scheduler-friendly config (TOML)

[dataset]
data_dir = "data/tier1"
symbols = "SPY.NYSE"
out_dir = "ml_out"
include_macro = false
include_l2 = false
horizon_minutes = 15
threshold = 0.001
lookback_periods = 30

[hpo]
enabled = false

[teacher]
enabled = true
model_id = "teacher_model"
max_epochs = 5

[promotions]
auto_register_model = true
gates_json = "ml/config/promotion_gates_example.json"
auto_promote = false
deploy_target = ""
auto_register_features = false
feature_metrics_json = ""
refresh_features = false

[integration]
enabled = false
run_validators = true
