# ============================================================================
# ML Pipeline - SPY Production with Full Macro Feature Set
# ============================================================================
# Comprehensive macro features covering:
# - Duration / yield curve (rates regime)
# - Credit spreads / risk appetite (capital flows)
# - Growth / labor cycle (economic momentum)
# - Inflation / cost pressure (pricing power)
# - Cross-asset rotation (risk-on/off signals)
# - Liquidity / balance sheet (Fed policy transmission)
#
# Based on multi-asset framework for capturing regime shifts
# ============================================================================

stage = "full"

# ============================================================================
# INGESTION - Multi-Instrument Universe
# ============================================================================
[ingestion]
enabled = false  # Use existing 95 instruments in DataStore

# ============================================================================
# DATASET BUILD - Full Macro Feature Set
# ============================================================================
[dataset]
data_dir = "data/tier1"
symbols = "SPY"  # TODO: Expand to all 95 instruments after first successful run
# All 95: AAPL,ABBV,ABT,ACN,ADBE,AMAT,AMD,AMZN,AVGO,BA,BAC,BRK.B,C,CAT,COIN,COP,COST,CRM,CRWD,CVX,...
out_dir = "ml_out/spy_full_macro"
dataset_id = "spy_full_macro_v1"
convert_vintage_to_age = true

# Time range - ACTUAL DATA: March 28, 2023 → September 30, 2025 (2.5 years!)
# Training: Use last 12 months for training, hold out recent data for validation
start_iso = "2023-03-28T00:00:00Z"     # Start of available data
end_iso = "2025-09-30T23:59:59Z"       # End of available data

# Feature flags
include_macro = true
include_calendar = true
include_events = true
include_l2 = false
include_micro = false

# Macro configuration
macro_lag_days = 1
auto_refresh_macro = true
macro_staleness_hours = 24
macro_fred_path = "data/fred/fred_indicators_ml_format.parquet"

# ============================================================================
# COMPREHENSIVE MACRO SERIES (30 series across 6 dimensions)
# ============================================================================
macro_series_ids = [
    # ---- RATES / DURATION CURVE (7 series) ----
    # Front vs. long duration, curve slope, real yields
    "DGS2",           # 2-Year Treasury Constant Maturity Rate
    "DGS5",           # 5-Year Treasury Constant Maturity Rate
    "DGS10",          # 10-Year Treasury Constant Maturity Rate
    "DGS30",          # 30-Year Treasury Constant Maturity Rate
    "T10Y2Y",         # 10Y-2Y Spread (curve slope, recession signal)
    "DFII10",         # 10-Year TIPS (real yield after inflation)
    "FEDFUNDS",       # Federal Funds Effective Rate (policy anchor)

    # ---- CREDIT / CAPITAL MARKETS RISK (4 series) ----
    # Corporate spreads, funding stress, volatility
    "BAMLC0A0CM",     # ICE BofA US Corporate Index OAS (IG credit)
    "BAMLH0A0HYM2",   # ICE BofA US High Yield Index OAS (HY credit)
    "TEDRATE",        # TED Spread (USD funding stress)
    "VIXCLS",         # CBOE Volatility Index (equity risk premium)

    # ---- GROWTH / LABOR CYCLE (4 series) ----
    # Employment, production, broad activity
    "PAYEMS",         # Total Nonfarm Payrolls
    "UNRATE",         # Unemployment Rate
    "INDPRO",         # Industrial Production Index
    "CFNAI",          # Chicago Fed National Activity Index

    # ---- INFLATION & COST PRESSURE (4 series) ----
    # Consumer/producer prices, energy
    "CPIAUCSL",       # Consumer Price Index (headline inflation)
    "PCEPI",          # Personal Consumption Expenditures Price Index (Fed target)
    "PPIACO",         # Producer Price Index (pipeline pressure)
    "WTISPLC",        # WTI Crude Oil Spot Price (energy impulse)

    # ---- COMMODITIES / METALS (3 series) ----
    # Broad commodity basket + industrial/precious metals
    "PALLFNFINDEXM",  # World Bank Global Price Index of All Commodities
    "PCOPPUSDM",      # Global price of Copper
    "NASDAQQGLDI",    # Credit Suisse NASDAQ Gold FLOWS index

    # ---- CROSS-ASSET / RISK ROTATION (4 series) ----
    # FX carry/risk and global dollar impulse
    "DTWEXBGS",       # Trade-Weighted US Dollar Index (global risk-on/off)
    "DEXUSAL",        # USD/AUD Exchange Rate (commodity FX)
    "DEXUSEU",        # USD/EUR Exchange Rate (core risk)
    "DEXJPUS",        # JPY/USD Exchange Rate (carry vs. safe haven)

    # ---- LIQUIDITY / BALANCE SHEET (2 series) ----
    # Fed assets, bank credit (policy transmission)
    "WALCL",          # Fed Total Assets (balance sheet size)
    "TOTBKCR",        # Total Commercial Bank Credit
]

# Feature windows
lookback_periods = 60
horizon_minutes = 60
threshold = 0.0005

chunk_days = 30

# Feature registry
register_features = true
feature_registry_dir = "~/.nautilus/ml/features"
feature_role = "teacher"

# Dataset validation
[dataset.validation]
min_rows = 10000                       # With 2.5 years of data, expect way more rows
min_positive_rate = 0.35
max_positive_rate = 0.65
min_feature_coverage = 0.95

vintage_policy = "real_time"
emit_dataset_events = true

# ============================================================================
# HPO - Disabled for Initial Training
# ============================================================================
[hpo]
enabled = false

# ============================================================================
# TEACHER TRAINING - TFT with Full Feature Set
# ============================================================================
[training.teacher]
enabled = true
model_id = "tft_spy_full_macro_v1"
max_epochs = 50
feature_registry_dir = "~/.nautilus/ml/features"

# ============================================================================
# STUDENT DISTILLATION
# ============================================================================
[training.student]
enabled = true
model_id = "xgb_spy_full_macro_v1"
parent_model_id = "tft_spy_full_macro_v1"
model_registry_dir = "~/.nautilus/ml/models"
feature_registry_dir = "~/.nautilus/ml/features"
objective = "logit_mse"
kd_lambda = 0.5
early_stopping = 200
opset = 17

# ============================================================================
# PROMOTIONS
# ============================================================================
[promotions]
auto_register_model = true
auto_promote = false
gates_json = '{"min_sharpe": 0.5, "min_win_rate": 0.48}'

# ============================================================================
# INTEGRATION
# ============================================================================
[integration]
enabled = true
auto_migrate = true
ensure_healthy = true
# Runtime database connection is resolved via ML_DB_CONNECTION / NAUTILUS_DB env vars.
