# ML Pipeline Configuration
# Production configuration for run_ml_pipeline.py

# Catalog configuration
catalog_path: "./data"

# Universe configuration
universe_mode: "moderate"  # conservative, moderate, aggressive

# Custom symbol list (overrides universe_mode if provided)
# symbols:
#   - "SPY.XNAS"
#   - "QQQ.XNAS"
#   - "IWM.XNAS"

# Databento configuration
databento_dataset: "GLBX.MDP3"
databento_schema: "ohlcv-1m"  # ohlcv-1m, trades, mbp-1
databento_stype: "raw_symbol"
use_temp_files: true
temp_data_dir: "./temp_databento_data"
price_precision: null  # null for auto-detection

# Data collection settings
collection_time: "04:00"  # 4 AM UTC
retention_days: 90
enable_l2_depth: false
enable_trades: false
enable_quotes: false

# Feature computation
enable_features: true
enable_technical_features: true
enable_microstructure_features: false
enable_statistical_features: true
lookback_periods: [5, 20, 60]

# Error handling
max_retries: 3
retry_delay: 5.0
stop_on_error: false

# Performance settings
batch_size: 1000
parallel_workers: 4
memory_limit_gb: 8

# Monitoring and logging
metrics_enabled: true
metrics_port: 8000
log_level: "INFO"
log_file: "ml_pipeline.log"

# Backfill specific settings
backfill_batch_days: 5
backfill_delay_seconds: 1

# Real-time specific settings
realtime_buffer_size: 10000
realtime_flush_interval: 60  # seconds