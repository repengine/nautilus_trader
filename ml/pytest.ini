[pytest]
# ML Module Specific Pytest Configuration

# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test execution options (simplified for compatibility)
addopts = 
    # Reporting options
    -ra
    --strict-markers
    --tb=short
    --failed-first
    --new-first
    
    # Performance options
    --durations=10

# Asyncio settings
asyncio_mode = strict

# Timeout settings
timeout = 300
timeout_method = thread

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = ml_tests.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ResourceWarning
    error::UserWarning:ml.*

# Minimum version
minversion = 7.4.0

# Console output
console_output_style = progress

# Custom markers (local to ML module)
markers =
    # Test type markers (from conftest.py)
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    system: System tests
    property: Property-based tests
    contract: Contract tests
    benchmark: Performance benchmark tests
    slow: Slow running tests
    requires_data: Tests that require data fixtures
    
    # Priority markers
    critical: Tests that must pass for deployment
    smoke: Quick smoke tests for CI/CD
    regression: Regression tests for bug fixes
    
    # Data source markers  
    requires_l1_data: Requires L1 (OHLCV) data
    requires_l2_data: Requires L2 (order book) data
    requires_l3_data: Requires L3 (order flow) data
    
    # Performance markers
    memory_intensive: Tests with high memory usage
    cpu_intensive: Tests with high CPU usage
    
    # Stability markers
    unstable: Tests that may fail intermittently
    wip: Work in progress tests
    flaky: Known flaky tests that need investigation
    skip_ci: Tests to skip in CI environment
    nightly: Tests for nightly regression runs
    
    # Parallelization control (critical for database tests)
    serial: Must run serially - no parallelization
    parallel_safe: Safe for parallel execution
    database: Requires PostgreSQL connection (runs serially)
    redis: Requires Redis connection
    docker: Requires Docker containers
    
    # Component markers (from conftest.py)
    stores: Tests for store components
    registry: Tests for registry components
    actors: Tests for actor components
    strategies: Tests for strategy components
    features: Tests for feature components
    models: Tests for model components
    data: Tests for data components
    monitoring: Tests for monitoring components
    deployment: Tests for deployment components
    training: Tests for training components
    preprocessing: Tests for preprocessing components
    inference: Tests for inference components
    distillation: Tests for model distillation
    
    # Dependency markers
    requires_databento: Tests requiring Databento data
    requires_fred: Tests requiring FRED data
    requires_ml_deps: Tests requiring ML dependencies