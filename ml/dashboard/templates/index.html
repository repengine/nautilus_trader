<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nautilus ML Dashboard</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 16px; }
      header { display:flex; justify-content: space-between; align-items:center; }
      h1 { margin: 0 0 12px 0; font-size: 20px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
      .card { border: 1px solid #e3e3e3; border-radius: 8px; padding: 12px; }
      .row { display:flex; justify-content: space-between; align-items:center; margin: 6px 0; }
      .ok { color: #0a7b34; }
      .bad { color: #b00020; }
      button { padding: 6px 10px; margin-right: 6px; }
      code { background: #f5f5f5; padding: 2px 4px; border-radius: 4px; }
      small { color: #666; }
      .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-bottom: 8px; }
      .summary-item { background: #f7f7f7; border-radius: 6px; padding: 6px 8px; text-align: center; }
      .summary-item strong { display: block; font-size: 14px; margin-bottom: 4px; }
      .grafana-iframe { border: none; border-radius: 6px; width: 100%; height: 220px; margin-bottom: 8px; background: #fff; }
    </style>
  </head>
  <body>
    <header>
      <h1>Nautilus ML Dashboard</h1>
      <div>
        <input id="token" placeholder="Token (optional)" style="width:180px"/>
        <button id="saveToken">Save</button>
        <small><a href="/metrics" target="_blank">/metrics</a> · <a href="/api/services" target="_blank">/api</a></small>
      </div>
    </header>
    <div id="status" class="card">Loading…</div>
    <div class="grid">
      <div class="card">
        <h3>Services</h3>
        <div id="services"></div>
      </div>
      <div class="card">
        <h3>Observability</h3>
        <div id="summary" class="summary-grid"></div>
        <div id="deps"></div>
        <div id="grafanaStatus"></div>
        <div id="stores"></div>
      </div>
      <div class="card">
        <h3>Models</h3>
        <div id="models"></div>
      </div>
      <div class="card">
        <h3>Features</h3>
        <div id="features"></div>
      </div>
      <div class="card">
        <h3>Events</h3>
        <div>
          <label>Instrument: <input id="filterInstrument" placeholder="SPY"/></label>
          <label>Source: <input id="filterSource" placeholder="live|historical"/></label>
          <button id="refreshEvents">Refresh</button>
        </div>
        <div id="events"></div>
      </div>
      <div class="card">
        <h3>Pipeline</h3>
        <div>
          <label>Instrument: <input id="instrument" placeholder="SPY.EQUS" value="SPY.EQUS"/></label>
          <button id="runBackfill">Run Backfill</button>
          <button id="runDaily">Run Daily</button>
          <div id="pipelineResult"><small>Queued results will appear here.</small></div>
        </div>
      </div>
      <div class="card" id="grafanaCard" style="display:none">
        <h3>Grafana Panels</h3>
        <div id="grafanaEmbeds"></div>
      </div>
    </div>

    <script>
      // @ts-check
      /** @typedef {{[k:string]: string}} HeadersMap */
      /** @typedef {{ok?:boolean, url?:string, topic?:string, error?:string}} ApiResult */
      const el = (id) => document.getElementById(id);
      /** @type {HTMLElement} */ const status = /** @type {any} */(el('status'));
      /** @type {HTMLElement} */ const services = /** @type {any} */(el('services'));
      /** @type {HTMLElement} */ const deps = /** @type {any} */(el('deps'));
      /** @type {HTMLElement} */ const summary = /** @type {any} */(el('summary'));
      /** @type {HTMLElement} */ const grafanaStatus = /** @type {any} */(el('grafanaStatus'));
      /** @type {HTMLElement} */ const stores = /** @type {any} */(el('stores'));
      /** @type {HTMLElement} */ const models = /** @type {any} */(el('models'));
      /** @type {HTMLElement} */ const events = /** @type {any} */(el('events'));
      /** @type {HTMLElement} */ const features = /** @type {any} */(el('features'));
      /** @type {HTMLElement} */ const grafanaCard = /** @type {any} */(el('grafanaCard'));
      /** @type {HTMLElement} */ const grafanaEmbeds = /** @type {any} */(el('grafanaEmbeds'));
      const pipelineResult = el('pipelineResult');

      const grafanaEmbedEnabled = {{ 'true' if grafana_embed_enabled else 'false' }};
      const grafanaEmbedUrls = {{ grafana_embed_urls|tojson }};
      const grafanaTheme = {{ grafana_theme|tojson }};
      const grafanaDashboardUrl = {{ grafana_dashboard_url|tojson }};

      function icon(ok){ return ok ? '✅' : '❌'; }
      function link(href, text){ return `<a href="${href}" target="_blank">${text}</a>`; }
      function formatMetric(value, digits){
        if (value === null || value === undefined || Number.isNaN(value)) return '—';
        const num = Number(value);
        if (!Number.isFinite(num)) return '—';
        return num.toFixed(digits);
      }

      function renderGrafanaEmbeds(urls){
        if (!grafanaCard || !grafanaEmbeds) return;
        if (!grafanaEmbedEnabled || !urls.length){
          grafanaCard.style.display = 'none';
          grafanaEmbeds.innerHTML = '<small>Grafana embeds disabled.</small>';
          return;
        }
        grafanaCard.style.display = 'block';
        grafanaEmbeds.innerHTML = urls.map((url) => {
          const src = url.includes('theme=') ? url : `${url}&theme=${encodeURIComponent(grafanaTheme)}`;
          return `<iframe class="grafana-iframe" src="${src}" loading="lazy" title="Grafana panel"></iframe>`;
        }).join('');
      }
      renderGrafanaEmbeds(grafanaEmbedUrls);

      /** @returns {HeadersMap} */
      function getHeaders(){
        const t = localStorage.getItem('ml_dashboard_token');
        /** @type {HeadersMap} */ const h = {'content-type':'application/json'};
        if (t) h['X-ML-DASHBOARD-TOKEN'] = t;
        return h;
      }

      /** @returns {Promise<void>} */
      async function load(){
        try {
          /** @type {any} */ const sy = await fetch('/api/health/system').then(r => r.json());
          /** @type {Array<any>} */ const sv = await fetch('/api/services').then(r => r.json());

          status.textContent = 'Dashboard ready';

          services.innerHTML = sv.map(s => {
            const h = sy.services[s.name]?.healthy;
            const healthUrl = s.endpoints?.health || '#';
            const metricsUrl = s.endpoints?.metrics || '#';
            return `<div class="row">
              <div>${icon(h)} <strong>${s.name}</strong> · ${link(healthUrl, 'health')} · ${link(metricsUrl, 'metrics')}</div>
              <div>
                <button onclick="act('${s.name}','start')">Start</button>
                <button onclick="act('${s.name}','restart')">Restart</button>
                <button onclick="act('${s.name}','stop')">Stop</button>
              </div>
            </div>`;
          }).join('');

          deps.innerHTML = Object.entries(sy.dependencies).map(([k,v]) => {
            const url = k === 'prometheus' ? `http://localhost:${(new URL(window.location)).port==='8010' ? 9090 : 9090}/` :
                        k === 'grafana' ? `http://localhost:${(new URL(window.location)).port==='8010' ? 3000 : 3000}/` : '#';
            return `<div class="row">${icon(v.healthy)} <strong>${k}</strong> · ${link(url, k)}</div>`;
          }).join('');

          const [modelList, deploymentMap, obsStatus, obsSummary, storeSummary] = await Promise.all([
            fetch('/api/registry/models').then(r => r.json()),
            fetch('/api/registry/deployments').then(r => r.json()),
            fetch('/api/observability/status').then(r => r.json()),
            fetch('/api/observability/summary').then(r => r.json()),
            fetch('/api/observability/stores').then(r => r.json()),
          ]);
          const byTarget = (id) => Object.entries(deploymentMap).filter(([t, ids]) => ids.includes(id)).map(([t]) => t).join(', ');
          models.innerHTML = modelList.length ? modelList.map(m => `
            <div class="row">
              <div>🧠 <strong>${m.model_id}</strong> · ${m.role} · v${m.version} · ${m.architecture} · <code>${m.feature_schema_hash.slice(0,8)}</code></div>
            </div>
            <div class="row">
              <small>Status: ${m.deployment_status} · Targets: ${byTarget(m.model_id) || '—'}</small>
              <div>
                <button onclick="deploy('${m.model_id}','ml_signal_actor')">Deploy to ml_signal_actor</button>
              </div>
            </div>
          `).join('') : '<small>No models registered.</small>';

          await loadEvents();

          const feats = await fetch('/api/registry/features').then(r => r.json());
          features.innerHTML = feats.length ? feats.map(f => `
            <div class="row">
              <div>🧩 <strong>${f.feature_set_id}</strong> · ${f.role} · ${f.stage} · <code>${(f.schema_hash||'').slice(0,8)}</code></div>
              <div>
                <button onclick="featurePromote('${f.feature_set_id}','PROD')">Promote → PROD</button>
                <button onclick="featureDeprecate('${f.feature_set_id}')">Deprecate</button>
              </div>
            </div>
          `).join('') : '<small>No features found.</small>';

          summary.innerHTML = obsSummary.ok ? `
            <div class="summary-item">
              <strong>Req/s</strong>
              <span>${formatMetric(obsSummary.metrics.request_rate_per_second, 2)}</span>
            </div>
            <div class="summary-item">
              <strong>P95 (s)</strong>
              <span>${formatMetric(obsSummary.metrics.latency_p95_seconds, 2)}</span>
            </div>
            <div class="summary-item">
              <strong>Failures/5m</strong>
              <span>${formatMetric(obsSummary.metrics.event_failures_increase, 0)}</span>
            </div>
          ` : '<small>Summary unavailable.</small>';

          const lastAttempt = obsStatus.last_attempt_epoch ? new Date(obsStatus.last_attempt_epoch * 1000) : null;
          const lastText = lastAttempt ? lastAttempt.toLocaleTimeString() : 'never';
          grafanaStatus.innerHTML = `
            <div class="row">
              <div>${icon(obsStatus.ok)} Grafana Provisioned · <a href="${grafanaDashboardUrl}" target="_blank">dashboard</a></div>
              <small>Last attempt: ${lastText}${obsStatus.error && !obsStatus.ok ? ` · ${obsStatus.error}` : ''}</small>
            </div>
          `;

          stores.innerHTML = storeSummary.ok ? storeSummary.stores.map((s) => {
            const latest = s.latest_event_iso ? new Date(s.latest_event_iso).toLocaleString() : '—';
            const age = typeof s.age_seconds === 'number' ? `${(s.age_seconds / 60).toFixed(1)} min ago` : '—';
            const healthNotes = [
              s.fallback_active ? 'fallback' : null,
              s.connectivity_ok === false ? 'connectivity' : null,
              s.write_ok === false ? 'write' : null,
            ].filter(Boolean).join(', ');
            const backlog = typeof s.buffer_backlog === 'number' ? ` · backlog: ${s.buffer_backlog}` : '';
            const items = Array.isArray(s.items) && s.items.length ? `
              <ul style="margin:4px 0 0 16px; padding:0;">
                ${s.items.map((item) => {
                  const itemAge = typeof item.age_seconds === 'number' ? `${(item.age_seconds / 60).toFixed(1)} min` : '—';
                  return `<li><small><strong>${item.key}</strong> · ${item.latest_event_iso ? new Date(item.latest_event_iso).toLocaleString() : '—'} · ${itemAge}</small></li>`;
                }).join('')}
              </ul>` : '';
            return `
              <div class="row">
                <div>${icon(s.healthy)} <strong>${s.store}</strong> · ${latest} · ${age}${backlog}</div>
                <small>${healthNotes || 'healthy'}</small>
              </div>
              ${items}
            `;
          }).join('') : `<small>Store summary unavailable (${storeSummary.reason || 'error'}).</small>`;
        } catch (e) {
          status.textContent = 'Failed to load status';
        }
      }

      /** @param {string} name @param {'start'|'stop'|'restart'} action */
      async function act(name, action){
        try {
          const r = await fetch(`/api/services/${name}:action`, { method:'POST', headers:getHeaders(), body: JSON.stringify({action}) });
          /** @type {ApiResult} */ const j = await r.json();
          alert(`${name}:${action} → ${j.ok ? 'ok' : (j.error || 'noop')}`);
          load();
        } catch (e) { alert('Action failed'); }
      }

      /** @param {'backfill'|'daily'|'realtime'} mode */
      async function run(mode){
        const instrument = el('instrument').value || 'SPY.EQUS';
        /** @type {{mode:string, instrument:string}} */ const body = {mode, instrument};
        try {
          const r = await fetch(`/api/pipeline/run`, { method:'POST', headers:getHeaders(), body: JSON.stringify(body) });
          /** @type {ApiResult} */ const j = await r.json();
          pipelineResult.innerHTML = `<small>${mode} → ${j.ok ? 'queued' : 'noop'} (${j.topic || 'no-topic'})</small>`;
        } catch (e) { pipelineResult.textContent = 'failed'; }
      }

      /** @param {string} modelId @param {string} target */
      async function deploy(modelId, target){
        try {
          const r = await fetch(`/api/registry/models/${modelId}:deploy`, { method:'POST', headers:getHeaders(), body: JSON.stringify({target}) });
          /** @type {ApiResult} */ const j = await r.json();
          alert(`deploy ${modelId} → ${target}: ${j.ok ? 'ok' : 'failed'}`);
          load();
        } catch (e) { alert('deploy failed'); }
      }

      /** @param {string} id @param {string} stage */
      async function featurePromote(id, stage){
        try {
          const r = await fetch(`/api/registry/features/${id}:promote`, { method:'POST', headers:getHeaders(), body: JSON.stringify({stage}) });
          /** @type {ApiResult} */ const j = await r.json();
          alert(`promote ${id} → ${stage}: ${j.ok ? 'ok' : 'failed'}`);
          load();
        } catch (e) { alert('promote failed'); }
      }

      /** @param {string} id */
      async function featureDeprecate(id){
        try {
          const r = await fetch(`/api/registry/features/${id}:deprecate`, { method:'POST', headers:getHeaders(), body: JSON.stringify({reason:'deprecated via UI'}) });
          /** @type {ApiResult} */ const j = await r.json();
          alert(`deprecate ${id}: ${j.ok ? 'ok' : 'failed'}`);
          load();
        } catch (e) { alert('deprecate failed'); }
      }

      /** @type {HTMLInputElement} */ const tokenInput = /** @type {any} */(el('token'));
      el('saveToken').onclick = () => {
        const t = tokenInput.value.trim();
        if (t) localStorage.setItem('ml_dashboard_token', t);
        else localStorage.removeItem('ml_dashboard_token');
        alert('Token saved');
      };

      async function loadEvents(){
        const q = new URLSearchParams();
        const instr = el('filterInstrument').value.trim();
        const src = el('filterSource').value.trim();
        if (instr) q.set('instrument', instr);
        if (src) q.set('source', src);
        const arr = await fetch('/api/events?' + q.toString()).then(r => r.json());
        events.innerHTML = arr.length ? arr.map(e => `
          <div class="row"><small><code>${e.id}</code> · ${e.topic}</small></div>
        `).join('') : '<small>No events (bus disabled or empty).</small>';
      }
      el('refreshEvents').onclick = () => loadEvents();

      el('runBackfill').onclick = () => run('backfill');
      el('runDaily').onclick = () => run('daily');
      load();
      setInterval(load, 15000);
      setInterval(loadEvents, 5000);
    </script>
  </body>
  </html>
