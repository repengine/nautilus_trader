services:
  # Override Postgres port mapping for local dev to 5432
  postgres:
    ports:
      - "5432:5432"

  # Optional: PgAdmin for database management in dev
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nautilus.io
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped
    networks:
      - nautilus-ml

volumes:
  pgadmin_data:

networks:
  nautilus-ml:
    name: nautilus-ml
