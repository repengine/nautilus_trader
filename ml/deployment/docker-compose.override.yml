# Override to use main nautilus-database
services:
  ml_pipeline:
    environment:
      DB_CONNECTION: postgresql://postgres:postgres@nautilus-database:5432/nautilus
      FEATURE_STORE_CONNECTION: postgresql://postgres:postgres@nautilus-database:5432/nautilus
      MODEL_STORE_CONNECTION: postgresql://postgres:postgres@nautilus-database:5432/nautilus
      CATALOG_PATH: /app/data/catalog
      UNIVERSE_SYMBOLS: AAPL.EQUS,ABBV.EQUS,ABT.EQUS,ACN.EQUS,ADBE.EQUS,AMAT.EQUS,AMD.EQUS,AMZN.EQUS,AVGO.EQUS,BA.EQUS,BAC.EQUS,C.EQUS,CAT.EQUS,COIN.EQUS,COP.EQUS,COST.EQUS,CRM.EQUS,CRWD.EQUS,CVX.EQUS,DIA.EQUS,DIS.EQUS,EEM.EQUS,EFA.EQUS,FXE.EQUS,GE.EQUS,GLD.EQUS,GOOG.EQUS,GOOGL.EQUS,GS.EQUS,HD.EQUS,HOOD.EQUS,INTC.EQUS,IWM.EQUS,JNJ.EQUS,JPM.EQUS,KO.EQUS,LCID.EQUS,LLY.EQUS,LUV.EQUS,MA.EQUS,MCD.EQUS,META.EQUS,MMM.EQUS,MRK.EQUS,MRVL.EQUS,MS.EQUS,MSFT.EQUS,MSTR.EQUS,MU.EQUS,NFLX.EQUS,NKE.EQUS,NVDA.EQUS,ORCL.EQUS,OXY.EQUS,PEP.EQUS,PFE.EQUS,PG.EQUS,PLTR.EQUS,PYPL.EQUS,QQQ.EQUS,RIVN.EQUS,SLB.EQUS,SLV.EQUS,SOFI.EQUS,SPY.EQUS,T.EQUS,TLT.EQUS,TMO.EQUS,TMUS.EQUS,TSLA.EQUS,TSM.EQUS,TXN.EQUS,UBER.EQUS,UNG.EQUS,UNH.EQUS,USO.EQUS,UUP.EQUS,V.EQUS,VEA.EQUS,VIXY.EQUS,VNQ.EQUS,VNQI.EQUS,VTI.EQUS,VWO.EQUS,VXX.NASDAQ,VZ.EQUS,WBD.EQUS,WFC.EQUS,WMT.EQUS,XLB.NASDAQ,XLE.EQUS,XLF.EQUS,XLI.EQUS,XLK.EQUS,XLP.NASDAQ,XLRE.NASDAQ,XLU.NASDAQ,XLV.EQUS,XLY.NASDAQ,XOM.EQUS
      CATALOG_REHYDRATE_ENABLED: "1"
      CATALOG_REHYDRATE_LOOKBACK_DAYS: "1200"
      CATALOG_REHYDRATE_BATCH_SIZE: "1000"
      # CATALOG_REHYDRATE_IDENTIFIER_TEMPLATE is deprecated; identifiers come from ml/schema.py
      CATALOG_REHYDRATE_TABLE: "market_data"
      CATALOG_REHYDRATE_RESCAN: "0"
      CATALOG_REHYDRATE_STALE_ONLY: "0"
      CATALOG_REHYDRATE_EXHAUSTIVE: "1"
      COVERAGE_RESTORE_REINGEST_ENABLED: "0"
      COVERAGE_SCHEMA_AUDIT_TABLES: "ml_feature_values,ml_model_predictions,ml_strategy_signals,market_data_bar,market_data_quote_tick,market_data_tbbo,market_data_mbp1,market_data_mbp10,market_data_mbo,market_data_trade_tick"
      USE_ORCHESTRATOR: "1"
      DUAL_WRITE: "1"
      ML_MARKET_DATA_PROFILE: "class_tables"
      ML_ALLOW_MIGRATION_DRIFT: "1"
      MARKET_DATASET_INPUTS: '[{"descriptor_id":"EQUS.MINI"},{"descriptor_id":"EQUS.MINI_QUOTES"}]'
      MARKET_BACKFILL_LOOKBACK_DAYS: "7"
    volumes:
      - ../models:/app/models:rw
      - ../../data:/app/data:rw
      - ../logs:/app/logs:rw
      - ./configs:/app/configs:ro
      - ../stores/migrations_bootstrap:/app/migrations_bootstrap:ro
    networks:
      - docker_nautilus-network
      - nautilus-ml

networks:
  docker_nautilus-network:
    external: true
