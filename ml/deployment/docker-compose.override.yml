# Override to use main nautilus-database
services:
  ml_pipeline:
    environment:
      DB_CONNECTION: postgresql://postgres:postgres@nautilus-database:5432/nautilus
      FEATURE_STORE_CONNECTION: postgresql://postgres:postgres@nautilus-database:5432/nautilus
      MODEL_STORE_CONNECTION: postgresql://postgres:postgres@nautilus-database:5432/nautilus
      CATALOG_PATH: /app/data/catalog
      UNIVERSE_SYMBOLS: AAPL.XNAS,ABBV.XNAS,ABT.XNAS,ACN.XNAS,ADBE.XNAS,AMAT.XNAS,AMD.XNAS,AMZN.XNAS,AVGO.XNAS,BA.XNAS,BAC.XNAS,C.XNAS,CAT.XNAS,COIN.XNAS,COP.XNAS,COST.XNAS,CRM.XNAS,CRWD.XNAS,CVX.XNAS,DIA.XNAS,DIS.XNAS,EEM.XNAS,EFA.XNAS,FXE.XNAS,GE.XNAS,GLD.XNAS,GOOG.XNAS,GOOGL.XNAS,GS.XNAS,HD.XNAS,HOOD.XNAS,INTC.XNAS,IWM.XNAS,JNJ.XNAS,JPM.XNAS,KO.XNAS,LCID.XNAS,LLY.XNAS,LUV.XNAS,MA.XNAS,MCD.XNAS,META.XNAS,MMM.XNAS,MRK.XNAS,MRVL.XNAS,MS.XNAS,MSFT.XNAS,MSTR.XNAS,MU.XNAS,NFLX.XNAS,NKE.XNAS,NVDA.XNAS,ORCL.XNAS,OXY.XNAS,PEP.XNAS,PFE.XNAS,PG.XNAS,PLTR.XNAS,PYPL.XNAS,QQQ.EQUS,RIVN.XNAS,SLB.XNAS,SLV.XNAS,SOFI.XNAS,SPY.EQUS,T.XNAS,TLT.XNAS,TMO.XNAS,TMUS.XNAS,TSLA.XNAS,TSM.XNAS,TXN.XNAS,UBER.XNAS,UNG.XNAS,UNH.XNAS,USO.XNAS,UUP.XNAS,V.XNAS,VEA.XNAS,VIXY.XNAS,VNQ.XNAS,VNQI.XNAS,VTI.XNAS,VWO.XNAS,VXX.NASDAQ,VZ.XNAS,WBD.XNAS,WFC.XNAS,WMT.XNAS,XLB.NASDAQ,XLE.XNAS,XLF.XNAS,XLI.XNAS,XLK.XNAS,XLP.NASDAQ,XLRE.NASDAQ,XLU.NASDAQ,XLV.XNAS,XLY.NASDAQ,XOM.XNAS
      CATALOG_REHYDRATE_ENABLED: "1"
      CATALOG_REHYDRATE_LOOKBACK_DAYS: "1200"
      CATALOG_REHYDRATE_BATCH_SIZE: "1000"
      CATALOG_REHYDRATE_IDENTIFIER_TEMPLATE: "{instrument_id}-1-MINUTE-LAST-EXTERNAL"
      CATALOG_REHYDRATE_TABLE: "market_data"
      CATALOG_REHYDRATE_RESCAN: "0"
      CATALOG_REHYDRATE_STALE_ONLY: "0"
      CATALOG_REHYDRATE_EXHAUSTIVE: "1"
      COVERAGE_RESTORE_REINGEST_ENABLED: "0"
      COVERAGE_SCHEMA_AUDIT_TABLES: "ml_feature_values,ml_model_predictions,ml_strategy_signals,market_data_bar,market_data_quote_tick,market_data_tbbo,market_data_mbp1,market_data_trade_tick"
      USE_ORCHESTRATOR: "1"
      DUAL_WRITE: "1"
      ML_MARKET_DATA_PROFILE: "class_tables"
      ML_ALLOW_MIGRATION_DRIFT: "1"
      MARKET_DATASET_INPUTS: '[{"descriptor_id":"XNAS.ITCH_MBP10","start":"2023-03-28"}]'
      MARKET_BACKFILL_LOOKBACK_DAYS: "7"
    volumes:
      - ../models:/app/models:rw
      - ../../data:/app/data:rw
      - ../logs:/app/logs:rw
      - ./configs:/app/configs:ro
      - ../stores/migrations_bootstrap:/app/migrations_bootstrap:ro
    networks:
      - docker_nautilus-network
      - nautilus-ml

networks:
  docker_nautilus-network:
    external: true
