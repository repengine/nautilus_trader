# Docker Compose v2 format - no version needed

services:
  # PostgreSQL Database for ML persistence
  postgres:
    image: postgres:15-alpine
    container_name: nautilus_ml_postgres
    environment:
      POSTGRES_DB: nautilus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../stores/migrations:/docker-entrypoint-initdb.d:ro  # Auto-apply canonical migrations on first init
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nautilus_network

  # Redis for message bus (optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: nautilus_ml_redis
    ports:
      - "6379:6379"
    networks:
      - nautilus_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ML Signal Actor Container
  ml_signal_actor:
    build:
      context: ../..
      dockerfile: ml/deployment/Dockerfile.actor
    container_name: ml_signal_actor
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: '2'
    environment:
      # Database configuration
      DB_CONNECTION: postgresql://postgres:postgres@postgres:5432/nautilus

      # Databento configuration (set your API key)
      DATABENTO_API_KEY: "${DATABENTO_API_KEY}"
      DATABENTO_DATASET: "${DATABENTO_DATASET:-EQUS.MINI}"

      # Model configuration
      MODEL_PATH: /app/models/model.pkl
      INSTRUMENT_ID: SPY.XNAS
      BAR_TYPE: SPY.XNAS-1-MINUTE-LAST-EXTERNAL

      # Actor configuration
      ACTOR_ID: MLSignalActor-001
      USE_DUMMY_STORES: "false"  # Use real PostgreSQL
      LOG_LEVEL: INFO

    volumes:
      - ../models:/app/models:ro  # Mount models directory
      - ./configs:/app/configs:ro  # Mount configuration files
    depends_on:
      - postgres
      - redis
    networks:
      - nautilus_network
    restart: unless-stopped

  # ML Trading Strategy Container
  ml_strategy:
    build:
      context: ../..
      dockerfile: ml/deployment/Dockerfile.strategy
    container_name: ml_strategy
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: '2'
    environment:
      # Database configuration
      DB_CONNECTION: postgresql://postgres:postgres@postgres:5432/nautilus

      # Strategy configuration
      STRATEGY_ID: MLStrategy-DRY-001
      ML_SIGNAL_SOURCE: MLSignalActor-001
      INSTRUMENT_ID: SPY.XNAS

      # DRY RUN MODE
      EXECUTE_TRADES: "false"  # DRY RUN - NO REAL TRADES!

      # Risk parameters
      POSITION_SIZE_PCT: "0.02"
      MIN_CONFIDENCE: "0.6"
      MAX_POSITIONS: "1"
      STOP_LOSS_PCT: "0.02"
      TAKE_PROFIT_PCT: "0.04"

      # Persistence
      USE_STRATEGY_STORE: "true"
      PERSIST_ALL_SIGNALS: "true"

      LOG_LEVEL: INFO

    volumes:
      - ./configs:/app/configs:ro
    depends_on:
      - postgres
      - redis
      - ml_signal_actor
    networks:
      - nautilus_network
    restart: unless-stopped

  # ML Pipeline Service for data collection and feature computation
  ml_pipeline:
    build:
      context: ../..
      dockerfile: ml/deployment/Dockerfile.pipeline
    container_name: ml_pipeline
    deploy:
      resources:
        limits:
          memory: 16g  # More memory for data processing
          cpus: '4'
    environment:
      # Database configuration
      DB_CONNECTION: postgresql://postgres:postgres@postgres:5432/nautilus

      # Databento configuration
      DATABENTO_API_KEY: "${DATABENTO_API_KEY}"
      DATABENTO_DATASET: "${DATABENTO_DATASET:-EQUS.MINI}"

      # Pipeline configuration
      PIPELINE_MODE: "${PIPELINE_MODE:-daily}"  # daily, backfill, or realtime
      PIPELINE_SCHEDULE: "${PIPELINE_SCHEDULE:-0 17 * * *}"  # Default: 5 PM daily

      # Feature store configuration
      FEATURE_STORE_TYPE: postgres
      FEATURE_STORE_CONNECTION: postgresql://postgres:postgres@postgres:5432/nautilus

      # Model store configuration
      MODEL_STORE_TYPE: postgres
      MODEL_STORE_CONNECTION: postgresql://postgres:postgres@postgres:5432/nautilus

      # Catalog configuration
      CATALOG_PATH: /app/data/catalog

      # Universe configuration
      UNIVERSE_SYMBOLS: "${UNIVERSE_SYMBOLS:-SPY.XNAS}"  # Comma-separated list

      # Logging configuration
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      LOG_FILE: /app/logs/ml_pipeline.log

      # Performance settings
      MAX_WORKERS: "${MAX_WORKERS:-4}"
      BATCH_SIZE: "${BATCH_SIZE:-1000}"

      # Health check endpoint
      HEALTH_CHECK_PORT: 8080

    volumes:
      - ../models:/app/models:rw  # Read-write for model training
      - ../data:/app/data:rw  # Data catalog persistence
      - ../logs:/app/logs:rw  # Log persistence
      - ./configs:/app/configs:ro  # Configuration files
      - ../stores/migrations:/app/migrations:ro  # Canonical migrations (optional)
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nautilus_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: nautilus_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - nautilus_network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: nautilus_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - nautilus_network

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  nautilus_network:
    driver: bridge
