version: '3.8'

services:
  # PostgreSQL Database for ML persistence
  postgres:
    image: postgres:15-alpine
    container_name: nautilus_postgres
    environment:
      POSTGRES_DB: nautilus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../schema:/docker-entrypoint-initdb.d:ro  # Auto-create schemas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nautilus_network

  # Redis for message bus (optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: nautilus_redis
    ports:
      - "6379:6379"
    networks:
      - nautilus_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ML Signal Actor Container
  ml_signal_actor:
    build:
      context: ../..
      dockerfile: ml/deployment/Dockerfile.actor
    container_name: ml_signal_actor
    environment:
      # Database configuration
      DB_CONNECTION: postgresql://postgres:postgres@postgres:5432/nautilus
      
      # Databento configuration (set your API key)
      DATABENTO_API_KEY: ${DATABENTO_API_KEY}
      DATABENTO_DATASET: ${DATABENTO_DATASET:-GLBX.MDP3}
      
      # Model configuration
      MODEL_PATH: /app/models/model.pkl
      INSTRUMENT_ID: BTC-USDT.DATABENTO
      BAR_TYPE: BTC-USDT.DATABENTO-1-MINUTE
      
      # Actor configuration
      ACTOR_ID: MLSignalActor-001
      USE_DUMMY_STORES: "false"  # Use real PostgreSQL
      LOG_LEVEL: INFO
      
    volumes:
      - ../models:/app/models:ro  # Mount models directory
      - ./configs:/app/configs:ro  # Mount configuration files
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nautilus_network
    restart: unless-stopped

  # ML Trading Strategy Container
  ml_strategy:
    build:
      context: ../..
      dockerfile: ml/deployment/Dockerfile.strategy
    container_name: ml_strategy
    environment:
      # Database configuration
      DB_CONNECTION: postgresql://postgres:postgres@postgres:5432/nautilus
      
      # Strategy configuration
      STRATEGY_ID: MLStrategy-DRY-001
      ML_SIGNAL_SOURCE: MLSignalActor-001
      INSTRUMENT_ID: BTC-USDT.DATABENTO
      
      # DRY RUN MODE
      EXECUTE_TRADES: "false"  # DRY RUN - NO REAL TRADES!
      
      # Risk parameters
      POSITION_SIZE_PCT: "0.02"
      MIN_CONFIDENCE: "0.6"
      MAX_POSITIONS: "1"
      STOP_LOSS_PCT: "0.02"
      TAKE_PROFIT_PCT: "0.04"
      
      # Persistence
      USE_STRATEGY_STORE: "true"
      PERSIST_ALL_SIGNALS: "true"
      
      LOG_LEVEL: INFO
      
    volumes:
      - ./configs:/app/configs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml_signal_actor:
        condition: service_started
    networks:
      - nautilus_network
    restart: unless-stopped

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: nautilus_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - nautilus_network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: nautilus_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - nautilus_network

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  nautilus_network:
    driver: bridge