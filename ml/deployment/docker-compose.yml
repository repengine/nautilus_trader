# Docker Compose v2 format - pinned project name for consistency across environments
name: ml

# Compose v2 format (no explicit version key)

services:
  # PostgreSQL Database for ML persistence
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: nautilus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # Expose Postgres on host. Default to 5433 to avoid conflicts with dev stack.
    # Override with env var POSTGRES_HOST_PORT=5432 if you are not running the dev compose.
    ports:
      # Map host port → container port; override POSTGRES_HOST_PORT to avoid conflicts
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../stores/migrations:/docker-entrypoint-initdb.d:ro  # Auto-apply canonical migrations on first init
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nautilus-ml

  # Redis for message bus (optional but recommended)
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    networks:
      - nautilus-ml
    healthcheck:
      test: ["CMD-SHELL", "cd / && redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ML Signal Actor Container
  ml_signal_actor:
    build:
      context: ../..
      dockerfile: ml/deployment/Dockerfile.actor
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: '2'
    environment:
      # Database configuration
      DB_CONNECTION: postgresql://postgres:postgres@postgres:5432/nautilus

      # Databento configuration (set your API key)
      DATABENTO_API_KEY: "${DATABENTO_API_KEY}"
      DATABENTO_DATASET: "${DATABENTO_DATASET:-EQUS.MINI}"
      USE_MOCK_DATA: "${ML_USE_MOCK_DATA:-false}"

      # Model configuration
      MODEL_PATH: /app/models/dummy_bullish_model.onnx
      INSTRUMENT_ID: SPY.EQUS
      BAR_TYPE: SPY.EQUS-1-MINUTE-LAST-EXTERNAL
      # Optional multi-instrument universe (comma-separated symbols)
      UNIVERSE_SYMBOLS: "${UNIVERSE_SYMBOLS:-}"

      # Actor configuration
      ACTOR_ID: MLSignalActor-001
      USE_DUMMY_STORES: "false"  # Use real PostgreSQL
      LOG_LEVEL: INFO
      # Multi-instrument batching (optional)
      MAX_BATCH_SIZE: "${MAX_BATCH_SIZE:-128}"
      FEATURE_DIM: "${FEATURE_DIM:-64}"
      FLUSH_MAX_LATENCY_MS: "${FLUSH_MAX_LATENCY_MS:-0}"

    volumes:
      - ../models:/app/models:ro  # Mount models directory
      - ./configs:/app/configs:ro  # Mount configuration files
    depends_on:
      - postgres
      - redis
    networks:
      - nautilus-ml
    restart: unless-stopped
    ports:
      - "${ML_ACTOR_HOST_PORT:-8000}:8000"

  # ML Trading Strategy Container
  ml_strategy:
    build:
      context: ../..
      dockerfile: ml/deployment/Dockerfile.strategy
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: '2'
    environment:
      # Database configuration
      DB_CONNECTION: postgresql://postgres:postgres@postgres:5432/nautilus

      # Strategy configuration
      STRATEGY_ID: MLStrategy-DRY-001
      ML_SIGNAL_SOURCE: MLSignalActor-001
      INSTRUMENT_ID: SPY.EQUS

      # DRY RUN MODE
      EXECUTE_TRADES: "false"  # DRY RUN - NO REAL TRADES!

      # Risk parameters
      POSITION_SIZE_PCT: "0.02"
      MIN_CONFIDENCE: "0.6"
      MAX_POSITIONS: "1"
      STOP_LOSS_PCT: "0.02"
      TAKE_PROFIT_PCT: "0.04"

      # Persistence
      USE_STRATEGY_STORE: "true"
      PERSIST_ALL_SIGNALS: "true"

      LOG_LEVEL: INFO

    volumes:
      - ./configs:/app/configs:ro
    depends_on:
      - postgres
      - redis
      - ml_signal_actor
    networks:
      - nautilus-ml
    restart: unless-stopped
    ports:
      - "${ML_STRATEGY_HOST_PORT:-8001}:8001"

  # ML Pipeline Service for data collection and feature computation
  ml_pipeline:
    build:
      context: ../..
      dockerfile: ml/deployment/Dockerfile.pipeline
    deploy:
      resources:
        limits:
          memory: 16g  # More memory for data processing
          cpus: '4'
    environment:
      # Database configuration
      DB_CONNECTION: postgresql://postgres:postgres@postgres:5432/nautilus

      # Databento configuration
      DATABENTO_API_KEY: "${DATABENTO_API_KEY}"
      DATABENTO_DATASET: "${DATABENTO_DATASET:-EQUS.MINI}"
      ML_ENABLE_DATABENTO: "1"  # allow import for health even without API key

      # Pipeline configuration
      PIPELINE_MODE: "${PIPELINE_MODE:-daily}"  # daily, backfill, or realtime
      PIPELINE_SCHEDULE: "${PIPELINE_SCHEDULE:-0 17 * * *}"  # Default: 5 PM daily

      # Feature store configuration
      FEATURE_STORE_TYPE: postgres
      FEATURE_STORE_CONNECTION: postgresql://postgres:postgres@postgres:5432/nautilus

      # Model store configuration
      MODEL_STORE_TYPE: postgres
      MODEL_STORE_CONNECTION: postgresql://postgres:postgres@postgres:5432/nautilus

      # Catalog configuration
      CATALOG_PATH: /app/data/catalog

      # Universe configuration
      UNIVERSE_SYMBOLS: "${UNIVERSE_SYMBOLS:-SPY.XNAS}"  # Comma-separated list

      # Logging configuration
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      LOG_FILE: /app/logs/ml_pipeline.log

      # Performance settings
      MAX_WORKERS: "${MAX_WORKERS:-4}"
      BATCH_SIZE: "${BATCH_SIZE:-1000}"

      # Health check endpoint
      HEALTH_CHECK_PORT: 8080

    volumes:
      - ../models:/app/models:rw  # Read-write for model training
      - ../data:/app/data:rw  # Data catalog persistence
      - ../logs:/app/logs:rw  # Log persistence
      - ./configs:/app/configs:ro  # Configuration files
      - ../stores/migrations:/app/migrations:ro  # Canonical migrations (optional)
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nautilus-ml
    restart: unless-stopped
    healthcheck:
      # HTTP-based health check for the pipeline service
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    ports:
      - "${ML_PIPELINE_HOST_PORT:-8081}:8080"

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - nautilus-ml

  # Grafana for visualization
  grafana:
    image: grafana/grafana-oss:10.3.3
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - nautilus-ml

  # Dashboard Control Plane (cold path)
  ml_dashboard:
    build:
      context: ../..
      dockerfile: ml/deployment/Dockerfile.pipeline
    environment:
      # Database configuration
      ML_DB_CONNECTION: postgresql://postgres:postgres@postgres:5432/nautilus
      ML_DASHBOARD_USE_COMPOSE: "${ML_DASHBOARD_USE_COMPOSE:-1}"
      ML_DASHBOARD_TIMEOUT: "${ML_DASHBOARD_TIMEOUT:-2.5}"
      ML_DASHBOARD_HOST: "0.0.0.0"
      # Service URLs for Docker networking
      ML_SIGNAL_ACTOR_URL: "http://ml_signal_actor:8000"
      ML_STRATEGY_URL: "http://ml_strategy:8001"
      ML_PIPELINE_URL: "http://ml_pipeline:8080"
      PROMETHEUS_URL: "http://prometheus:9090"
      GRAFANA_URL: "http://grafana:3000"
      # Host ports for external access (used in UI links)
      ML_ACTOR_HOST_PORT: "${ML_ACTOR_HOST_PORT:-8000}"
      ML_STRATEGY_HOST_PORT: "${ML_STRATEGY_HOST_PORT:-8001}"
      ML_PIPELINE_HOST_PORT: "${ML_PIPELINE_HOST_PORT:-8081}"
      PROMETHEUS_HOST_PORT: "${PROMETHEUS_HOST_PORT:-9090}"
      GRAFANA_HOST_PORT: "${GRAFANA_HOST_PORT:-3000}"
      ML_LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    command: ["python", "-m", "ml.dashboard.serve"]
    depends_on:
      - prometheus
      - grafana
    networks:
      - nautilus-ml
    restart: unless-stopped
    ports:
      - "${ML_DASHBOARD_HOST_PORT:-8010}:8010"

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  nautilus-ml:
    driver: bridge
    name: nautilus-ml
