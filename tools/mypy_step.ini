[mypy]
python_version = 3.11
strict = True
ignore_missing_imports = True
follow_imports = normal
namespace_packages = True
explicit_package_bases = True
plugins = sqlalchemy.ext.mypy.plugin

# Limit to files touched in the current tranche step
files = ml/training/export.py

[mypy-nautilus_trader.*]
ignore_errors = True

[mypy-ml.*]
ignore_errors = True

[mypy-ml.training.export]
ignore_errors = False

[mypy-ml.stores.data_store]
ignore_errors = True
