rules:
  - id: ml-no-pickle-joblib-in-prod
    message: "Insecure model serialization (pickle/joblib) in production paths; use ONNX + onnxruntime"
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: |
              import pickle
          - pattern: |
              import joblib
    paths:
      include:
        - "**/ml/actors/**"
        - "**/ml/strategies/**"
        - "**/ml/deployment/**"
        - "**/ml/inference/**"

  - id: ml-no-open-in-on_handlers
    message: "File I/O in hot path event handlers is prohibited (use async/off-path)"
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-inside: |
          def $FN(...):
              ...
      - metavariable-regex:
          metavariable: $FN
          regex: "^on_.*$"
      - pattern: open(...)
    paths:
      include:
        - "**/ml/actors/**"

  - id: ml-no-requests-in-on_handlers
    message: "Network calls in event handlers violate hot-path constraints"
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-inside: |
          def $FN(...):
              ...
      - metavariable-regex:
          metavariable: $FN
          regex: "^on_.*$"
      - pattern-either:
          - pattern: requests.$F(...)
          - pattern: httpx.$F(...)
          - pattern: urllib.request.$F(...)
    paths:
      include:
        - "**/ml/actors/**"

  - id: ml-enforce-EventStatus-value
    message: "Use EventStatus.<...>.value instead of raw status strings"
    severity: ERROR
    languages: [python]
    pattern-either:
      - pattern: |
          { ..., "status": "SUCCESS", ... }
      - pattern: |
          dict(..., status="SUCCESS", ...)
      - pattern: |
          $X.update({"status": "SUCCESS", ...})
    paths:
      include:
        - "**/ml/**"
      exclude:
        - "**/ml/tests/**"

  - id: ml-no-build_topic-in-stores-actors
    message: "Use build_topic_for_stage(...) instead of build_topic(...) in stores/actors"
    severity: ERROR
    languages: [python]
    pattern-either:
      - pattern: build_topic(...)
      - pattern: message_topics.build_topic(...)
    paths:
      include:
        - "**/ml/actors/**"
        - "**/ml/stores/**"

  - id: ml-no-direct-prometheus-client
    message: "Use ml.common.metrics_bootstrap instead of direct prometheus_client"
    severity: ERROR
    languages: [python]
    patterns:
      - pattern: |
          from prometheus_client import $X
      - pattern: |
          import prometheus_client
    paths:
      include:
        - "**/ml/**"
      exclude:
        - "**/ml/_imports.py"
        - "**/ml/common/metrics.py"

  - id: ml-no-raw-stage-source-status-in-registry-emit
    message: "Pass enums for stage/source/status (use Stage/Source/EventStatus), not raw strings."
    severity: ERROR
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: $REG.emit_event(..., stage="$S", ...)
          - pattern: $REG.emit_event(..., source="$S", ...)
          - pattern: $REG.emit_event(..., status="$S", ...)
    paths:
      include:
        - "**/ml/**"
      exclude:
        - "**/ml/tests/**"

  - id: ml-no-sqlite3-redis-in-prod
    message: "Do not bypass stores/bus with direct sqlite3/redis clients"
    severity: ERROR
    languages: [python]
    pattern-either:
      - pattern: sqlite3.connect(...)
      - pattern: redis.Redis(...)
      - pattern: redis.from_url(...)
    paths:
      include:
        - "**/ml/actors/**"
        - "**/ml/stores/**"

  - id: ml-no-pandas-in-actors
    message: "Pandas usage in actors indicates potential hot-path violations"
    severity: WARNING
    languages: [python]
    pattern-either:
      - pattern: import pandas as pd
      - pattern: pandas.DataFrame(...)
      - pattern: pd.DataFrame(...)
    paths:
      include:
        - "**/ml/actors/**"

  - id: ml-prefer-strict-store-protocol
    message: "Prefer Strict store protocols for new public APIs (Feature/Model/StrategyStoreStrictProtocol)"
    severity: WARNING
    languages: [python]
    pattern-regex: 'def\s+\w+\([^\)]*:\s*(FeatureStoreProtocol|ModelStoreProtocol|StrategyStoreProtocol)[^\)]*\)|def\s+\w+\([^\)]*\)\s*->\s*(FeatureStoreProtocol|ModelStoreProtocol|StrategyStoreProtocol)'
    paths:
      include:
        - "**/ml/**"
      exclude:
        - "**/ml/tests/**"
        - "**/ml/stores/protocols.py"
        - "**/ml/stores/**/compat/**"

  - id: ml-no-except-pass
    message: "Avoid silent except/pass; use best-effort debug logging"
    severity: WARNING
    languages: [python]
    pattern-regex: 'except(\s+Exception)?\s*:\s*(pass|\.\.\.)'
    paths:
      include:
        - "**/ml/**"
      exclude:
        - "**/ml/tests/**"

  - id: ml-require-exc-info-in-except-logs
    message: "Log exceptions with exc_info=True inside except blocks"
    severity: WARNING
    languages: [python]
    patterns:
      - pattern-inside: |
          try:
              ...
          except Exception as $E:
              ...
      - pattern-either:
          - pattern: $LOG.debug($MSG)
          - pattern: $LOG.info($MSG)
          - pattern: $LOG.warning($MSG)
          - pattern: $LOG.error($MSG)
          - pattern: $LOG.critical($MSG)
      - metavariable-regex:
          metavariable: $LOG
          regex: "[a-zA-Z_][a-zA-Z0-9_\\.]*"
      - pattern-not: $LOG.$F(..., exc_info=True, ...)
    paths:
      include:
        - "**/ml/**"
      exclude:
        - "**/ml/tests/**"

  - id: ml-no-basicConfig-outside-entrypoints
    message: "Do not call logging.basicConfig outside entrypoints; use central configure_logging"
    severity: ERROR
    languages: [python]
    pattern: logging.basicConfig(...)
    paths:
      include:
        - "**/ml/**"
      exclude:
        - "**/ml/deployment/**"
        - "**/ml/tests/**"
